benchmark:
  grid_size: 8
  image_size: 20
  latent_dim: 8
  hidden_dim: 96
  train_fraction: 0.78
  epochs: 280
  lr: 0.003
  seeds: [3, 11, 29]
  worlds: [commutative, noncommutative]
